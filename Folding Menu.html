<style>
html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  touch-action: none;
}

* {
  box-sizing: border-box;
}

.folding-menu-root {
  --rail-width: clamp(118px, 28%, 230px);
  --teal: rgb(4, 170, 142);
  --submenu-top: 50%;
  --connector-top: 50%;

  position: relative;
  width: 100%;
  height: 100%;
  padding: clamp(4px, 1.4vmin, 10px);
  background: transparent;
  overflow: hidden;
  font-family: "Segoe UI", sans-serif;
  color: white;
}

.primary-rail {
  position: absolute;
  left: clamp(4px, 1.4vmin, 10px);
  top: clamp(4px, 1.4vmin, 10px);
  bottom: clamp(4px, 1.4vmin, 10px);
  width: var(--rail-width);
  border-radius: 10px;
  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.24),
      rgba(52, 68, 68, 0.26) 42%,
      rgba(4, 170, 142, 0.16)
    );
  border: 1px solid rgba(255, 255, 255, 0.36);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.42),
    inset 0 -24px 42px rgba(4, 170, 142, 0.1),
    0 0 14px rgba(4, 170, 142, 0.38),
    0 8px 18px rgba(0, 0, 0, 0.24);
  backdrop-filter: blur(14px) saturate(135%);
  -webkit-backdrop-filter: blur(14px) saturate(135%);
  overflow: hidden;
  z-index: 3;
}

.primary-rail::before {
  content: "";
  position: absolute;
  inset: 1px;
  border-radius: 9px;
  background:
    linear-gradient(
      120deg,
      rgba(255, 255, 255, 0.22),
      rgba(255, 255, 255, 0.06) 34%,
      rgba(255, 255, 255, 0) 58%
    );
  pointer-events: none;
}

.primary-list {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: grid;
  gap: clamp(4px, 1.4vmin, 9px);
  padding: clamp(5px, 1.5vmin, 10px);
}

.primary-button,
.submenu-button {
  min-width: 0;
  min-height: 0;
  border: none;
  color: var(--teal);
  cursor: pointer;
  font-family: "Segoe UI", sans-serif;
  appearance: none;
  -webkit-appearance: none;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.02)),
    rgba(102, 102, 102, 0.16);
  border: 1px solid rgba(255, 255, 255, 0.13);
  transition:
    background-color 0.2s ease,
    border-color 0.2s ease,
    box-shadow 0.2s ease,
    transform 0.2s ease;
}

.primary-button {
  width: 100%;
  height: 100%;
  border-radius: 7px;
  flex-direction: column;
  justify-content: center;
  gap: clamp(4px, 1.4vmin, 8px);
  padding: clamp(5px, 1.8vmin, 12px);
}

.primary-button.pressed,
.primary-button:hover {
  background-color: rgba(102, 102, 102, 0.48);
  border-color: rgba(4, 170, 142, 0.7);
  box-shadow:
    inset 0 0 16px rgba(4, 170, 142, 0.14),
    0 0 14px rgba(4, 170, 142, 0.6);
}

.primary-button.active {
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.24), rgba(4, 170, 142, 0.78)),
    rgba(4, 170, 142, 0.86);
  border-color: rgba(255, 255, 255, 0.9);
  box-shadow:
    inset 0 0 18px rgba(255, 255, 255, 0.2),
    0 0 20px rgba(4, 170, 142, 0.92),
    0 0 3px rgba(255, 255, 255, 0.92);
}

.primary-button.pressed {
  transform: scale(0.96);
}

.primary-button-icon {
  width: clamp(24px, 8vmin, 48px);
  height: clamp(24px, 8vmin, 48px);
  flex: 0 0 auto;
  color: var(--teal);
  filter: drop-shadow(0 0 7px rgba(4, 170, 142, 0.55));
}

.primary-button.active .primary-button-icon {
  color: white;
  filter:
    drop-shadow(0 0 8px rgba(255, 255, 255, 0.66))
    drop-shadow(0 0 10px rgba(4, 170, 142, 0.74));
}

.primary-button-label {
  width: 100%;
  min-width: 0;
  color: var(--teal);
  font-size: clamp(11px, 4.8vmin, 24px);
  font-weight: 700;
  line-height: 1;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow: 0 0 8px rgba(4, 170, 142, 0.45);
}

.primary-button.active .primary-button-label {
  color: white;
  text-shadow:
    0 1px 4px rgba(0, 0, 0, 0.55),
    0 0 10px rgba(255, 255, 255, 0.52);
}

.submenu-panel {
  position: absolute;
  left: calc(var(--rail-width) + clamp(8px, 2vmin, 16px));
  right: clamp(4px, 1.4vmin, 10px);
  top: var(--submenu-top);
  max-height: calc(100% - 12px);
  border-radius: 9px;
  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.2),
      rgba(52, 68, 68, 0.22) 42%,
      rgba(4, 170, 142, 0.13)
    );
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.36),
    inset 0 -18px 34px rgba(4, 170, 142, 0.09),
    0 0 14px rgba(4, 170, 142, 0.36),
    0 8px 18px rgba(0, 0, 0, 0.24);
  backdrop-filter: blur(14px) saturate(135%);
  -webkit-backdrop-filter: blur(14px) saturate(135%);
  overflow: visible;
  opacity: 0;
  transform: translateY(-50%) scaleX(0.02);
  transform-origin: left center;
  pointer-events: none;
  will-change: transform, opacity;
  z-index: 2;
}

.submenu-panel.open {
  opacity: 1;
  transform: translateY(-50%) scaleX(1);
  pointer-events: auto;
}

.submenu-panel.opening {
  animation: submenu-open 0.45s cubic-bezier(0.67, 0.17, 0.4, 0.83) both;
  pointer-events: auto;
}

.submenu-panel.closing {
  animation: submenu-close 0.45s cubic-bezier(0.67, 0.17, 0.4, 0.83) both;
  pointer-events: none;
}

.submenu-panel::before {
  content: "";
  position: absolute;
  left: calc(clamp(8px, 2vmin, 16px) * -1);
  top: var(--connector-top);
  width: clamp(8px, 2vmin, 16px);
  height: clamp(34px, 9vmin, 58px);
  transform: translateY(-50%);
  background:
    linear-gradient(
      90deg,
      rgba(4, 170, 142, 0.34),
      rgba(255, 255, 255, 0.18)
    );
  border-top-left-radius: 999px;
  border-bottom-left-radius: 999px;
  box-shadow: 0 0 12px rgba(4, 170, 142, 0.42);
  pointer-events: none;
}

@keyframes submenu-open {
  0% {
    opacity: 0;
    transform: translateY(-50%) scaleX(0.02);
  }

  100% {
    opacity: 1;
    transform: translateY(-50%) scaleX(1);
  }
}

@keyframes submenu-close {
  0% {
    opacity: 1;
    transform: translateY(-50%) scaleX(1);
  }

  100% {
    opacity: 0;
    transform: translateY(-50%) scaleX(0.02);
  }
}

.submenu-inner {
  position: relative;
  width: 100%;
  height: 100%;
  padding: clamp(6px, 1.8vmin, 12px);
  overflow: hidden;
}

.submenu-title {
  color: white;
  font-size: clamp(12px, 4.2vmin, 22px);
  font-weight: 800;
  line-height: 1;
  margin-bottom: clamp(5px, 1.5vmin, 10px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow:
    0 2px 5px rgba(0, 0, 0, 0.64),
    0 0 12px rgba(4, 170, 142, 0.55);
}

.submenu-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: clamp(4px, 1.4vmin, 8px);
  max-height: calc(100% - clamp(22px, 6vmin, 36px));
  overflow: hidden;
}

.submenu-button {
  width: 100%;
  min-height: clamp(34px, 12vmin, 62px);
  border-radius: 7px;
  justify-content: flex-start;
  gap: clamp(6px, 2vmin, 12px);
  padding: clamp(6px, 1.8vmin, 11px);
}

.submenu-button.pressed,
.submenu-button:hover {
  background-color: rgba(102, 102, 102, 0.5);
  border-color: rgba(4, 170, 142, 0.74);
  box-shadow:
    inset 0 0 14px rgba(4, 170, 142, 0.16),
    0 0 13px rgba(4, 170, 142, 0.52);
}

.submenu-button.active {
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(4, 170, 142, 0.72)),
    rgba(4, 170, 142, 0.8);
  border-color: rgba(255, 255, 255, 0.88);
  box-shadow:
    inset 0 0 16px rgba(255, 255, 255, 0.18),
    0 0 18px rgba(4, 170, 142, 0.86),
    0 0 3px rgba(255, 255, 255, 0.86);
}

.submenu-button.pressed {
  transform: scale(0.975);
}

.submenu-button-icon {
  width: clamp(20px, 6vmin, 38px);
  height: clamp(20px, 6vmin, 38px);
  flex: 0 0 auto;
  color: var(--teal);
  filter: drop-shadow(0 0 6px rgba(4, 170, 142, 0.52));
}

.submenu-button.active .submenu-button-icon {
  color: white;
  filter:
    drop-shadow(0 0 7px rgba(255, 255, 255, 0.62))
    drop-shadow(0 0 9px rgba(4, 170, 142, 0.7));
}

.submenu-button-label {
  flex: 1;
  min-width: 0;
  color: var(--teal);
  font-size: clamp(12px, 4.6vmin, 24px);
  font-weight: 700;
  line-height: 1;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow: 0 0 8px rgba(4, 170, 142, 0.38);
}

.submenu-button.active .submenu-button-label {
  color: white;
  text-shadow:
    0 1px 4px rgba(0, 0, 0, 0.55),
    0 0 9px rgba(255, 255, 255, 0.48);
}
</style>

<div class="folding-menu-root" id="folding-menu-root">
  <div class="primary-rail">
    <div class="primary-list" id="primary-list"></div>
  </div>

  <div class="submenu-panel" id="submenu-panel">
    <div class="submenu-inner">
      <div class="submenu-title" id="submenu-title">Menu</div>
      <div class="submenu-list" id="submenu-list"></div>
    </div>
  </div>
</div>

<script>
(function () {
  var defaultSelectedIndex = -1;

  var primaryButtons = [
    {
      label: "Home",
      icon: "home",
      pressSignal: "111",
      feedbackSignal: "111",
      submenu: [
        { label: "Dashboard", icon: "home", pressSignal: "121", feedbackSignal: "121" },
        { label: "Weather", icon: "cloud", pressSignal: "122", feedbackSignal: "122" },
        { label: "Schedule", icon: "calendar", pressSignal: "10\23", feedbackSignal: "123" }
      ]
    },
    {
      label: "Video",
      icon: "video",
      pressSignal: "112",
      feedbackSignal: "112",
      submenu: [
        { label: "Laptop", icon: "laptop", pressSignal: "124", feedbackSignal: "124" },
        { label: "Apple TV", icon: "display", pressSignal: "125", feedbackSignal: "125" },
        { label: "Camera", icon: "camera", pressSignal: "126", feedbackSignal: "126" }
      ]
    },
    {
      label: "Mics",
      icon: "mics",
      pressSignal: "113",
      feedbackSignal: "113",
      submenu: [
        { label: "Mute All", icon: "mute", pressSignal: "127", feedbackSignal: "127" },
        { label: "Podium", icon: "mics", pressSignal: "128", feedbackSignal: "1238" },
        { label: "Ceiling", icon: "mics", pressSignal: "129", feedbackSignal: "129" }
      ]
    },
    {
      label: "Displays",
      icon: "display",
      pressSignal: "114",
      feedbackSignal: "114",
      submenu: [
        { label: "Display 1", icon: "display", pressSignal: "130", feedbackSignal: "130" },
        { label: "Display 2", icon: "display", pressSignal: "131", feedbackSignal: "131" },
        { label: "Power", icon: "power", pressSignal: "132", feedbackSignal: "132" }
      ]
    },
    {
      label: "Settings",
      icon: "settings",
      pressSignal: "115",
      feedbackSignal: "115",
      submenu: [
        { label: "Audio", icon: "volume", pressSignal: "133", feedbackSignal: "133" },
        { label: "Lights", icon: "lights", pressSignal: "134", feedbackSignal: "134" },
        { label: "Shutdown", icon: "power", pressSignal: "135", feedbackSignal: "135" }
      ]
    }
  ];

  function getCrComLib() {
    try {
      return window.CrComLib ||
        (window.parent && window.parent.CrComLib) ||
        (window.top && window.top.CrComLib) ||
        null;
    } catch (e) {
      return window.CrComLib || null;
    }
  }

  function isHigh(value) {
    return value === true || value === 1 || value === "1";
  }

  function getIconSvg(name) {
    var icons = {
      home:
        '<path d="M3 11.5L12 4l9 7.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>' +
        '<path d="M5.5 10.5V20h13v-9.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>' +
        '<path d="M10 20v-5h4v5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>',

      video:
        '<rect x="3" y="6" width="14" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2"></rect>' +
        '<path d="M17 10l4-2v8l-4-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path>',

      display:
        '<rect x="3" y="5" width="18" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2"></rect>' +
        '<path d="M8 21h8M12 17v4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>',

      mics:
        '<rect x="9" y="3" width="6" height="11" rx="3" fill="none" stroke="currentColor" stroke-width="2"></rect>' +
        '<path d="M5 11a7 7 0 0014 0M12 18v3M8 21h8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>',

      mute:
        '<path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"></path>' +
        '<path d="M18 9l-5 5M13 9l5 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>',

      camera:
        '<path d="M4 7h4l2-2h4l2 2h4v12H4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path>' +
        '<circle cx="12" cy="13" r="3.5" fill="none" stroke="currentColor" stroke-width="2"></circle>',

      settings:
        '<circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"></circle>' +
        '<path d="M12 2v3M12 19v3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M2 12h3M19 12h3M4.9 19.1L7 17M17 7l2.1-2.1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>',

      power:
        '<path d="M12 3v9" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"></path>' +
        '<path d="M7 6.5a7 7 0 1010 0" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"></path>',

      volume:
        '<path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"></path>' +
        '<path d="M16 8a5 5 0 010 8M18.5 5.5a8.5 8.5 0 010 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>',

      lights:
        '<path d="M9 21h6M10 17h4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>' +
        '<path d="M8 10a4 4 0 118 0c0 2-1.5 3-2 5h-4c-.5-2-2-3-2-5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path>',

      laptop:
        '<rect x="5" y="5" width="14" height="10" rx="1.5" fill="none" stroke="currentColor" stroke-width="2"></rect>' +
        '<path d="M3 19h18l-2-4H5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path>',

      cloud:
        '<path d="M7 18h10a4 4 0 00.5-8 6 6 0 00-11-1.5A4.8 4.8 0 007 18z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path>',

      calendar:
        '<rect x="4" y="5" width="16" height="15" rx="2" fill="none" stroke="currentColor" stroke-width="2"></rect>' +
        '<path d="M8 3v4M16 3v4M4 10h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>'
    };

    return icons[name] || icons.home;
  }

  var lib = getCrComLib();
  var root = document.getElementById("folding-menu-root");
  var primaryList = document.getElementById("primary-list");
  var submenuPanel = document.getElementById("submenu-panel");
  var submenuTitle = document.getElementById("submenu-title");
  var submenuList = document.getElementById("submenu-list");

  var primaryEls = [];
  var primarySelectedStates = [];
  var selectedPrimaryIndex = -1;
  var pendingPrimaryIndex = -1;
  var transitionTimer = null;
  var animationTimer = null;
  var animationToken = 0;
  var submenuAnimationMs = 460;

  function pulseSignal(signal) {
    if (!lib || !signal) return;

    lib.publishEvent("b", signal, true);

    setTimeout(function () {
      lib.publishEvent("b", signal, false);
    }, 100);
  }

  function setPressed(el, pressed) {
    el.classList.toggle("pressed", pressed);
  }

  function setPrimaryActive() {
    primaryEls.forEach(function (button, index) {
      button.classList.toggle("active", index === selectedPrimaryIndex);
    });
  }

  function createIcon(className, iconName) {
    var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("class", className);
    svg.setAttribute("viewBox", "0 0 24 24");
    svg.setAttribute("aria-hidden", "true");
    svg.innerHTML = getIconSvg(iconName);
    return svg;
  }

  function renderPrimaryButtons() {
    primaryList.style.gridTemplateRows = "repeat(" + primaryButtons.length + ", 1fr)";
    primaryList.innerHTML = "";
    primaryEls = [];

    primaryButtons.forEach(function (buttonConfig, index) {
      var button = document.createElement("button");
      var label = document.createElement("span");

      button.className = "primary-button";
      button.type = "button";
      button.setAttribute("aria-label", buttonConfig.label);
      label.className = "primary-button-label";
      label.textContent = buttonConfig.label;

      button.appendChild(createIcon("primary-button-icon", buttonConfig.icon));
      button.appendChild(label);

      button.addEventListener("pointerdown", function (event) {
        setPressed(button, true);
        pulseSignal(buttonConfig.pressSignal);

        if (!lib) {
          applyPrimaryFeedback(index, selectedPrimaryIndex !== index);
        }

        event.preventDefault();
      });

      button.addEventListener("pointerup", function () {
        setPressed(button, false);
      });

      button.addEventListener("pointerleave", function () {
        setPressed(button, false);
      });

      button.addEventListener("pointercancel", function () {
        setPressed(button, false);
      });

      primaryList.appendChild(button);
      primaryEls.push(button);
    });
  }

  function renderSubmenu(index) {
    var config = primaryButtons[index];
    var submenu = config && config.submenu ? config.submenu : [];

    submenuTitle.textContent = config ? config.label : "Menu";
    submenuList.innerHTML = "";
    submenuList.style.gridTemplateRows = "repeat(" + Math.max(1, submenu.length) + ", 1fr)";

    submenu.forEach(function (itemConfig) {
      var button = document.createElement("button");
      var label = document.createElement("span");

      button.className = "submenu-button";
      button.type = "button";
      button.setAttribute("aria-label", itemConfig.label);
      label.className = "submenu-button-label";
      label.textContent = itemConfig.label;

      button.appendChild(createIcon("submenu-button-icon", itemConfig.icon));
      button.appendChild(label);

      button.addEventListener("pointerdown", function (event) {
        setPressed(button, true);
        pulseSignal(itemConfig.pressSignal);
        event.preventDefault();
      });

      button.addEventListener("pointerup", function () {
        setPressed(button, false);
      });

      button.addEventListener("pointerleave", function () {
        setPressed(button, false);
      });

      button.addEventListener("pointercancel", function () {
        setPressed(button, false);
      });

      submenuList.appendChild(button);

      if (lib && itemConfig.feedbackSignal) {
        lib.subscribeState("b", itemConfig.feedbackSignal, function (value) {
          button.classList.toggle("active", isHigh(value));
        });
      }
    });
  }

  function positionSubmenu(index) {
    var rootRect = root.getBoundingClientRect();
    var button = primaryEls[index];

    if (!button) return;

    var buttonRect = button.getBoundingClientRect();
    var selectedCenter = buttonRect.top + buttonRect.height / 2 - rootRect.top;
    var panelHeight = submenuPanel.offsetHeight || 120;
    var halfPanel = panelHeight / 2;
    var margin = 6;
    var panelCenter = Math.max(
      halfPanel + margin,
      Math.min(rootRect.height - halfPanel - margin, selectedCenter)
    );
    var panelTop = panelCenter - halfPanel;
    var connectorTop = selectedCenter - panelTop;

    connectorTop = Math.max(18, Math.min(panelHeight - 18, connectorTop));

    root.style.setProperty("--submenu-top", panelCenter + "px");
    root.style.setProperty("--connector-top", connectorTop + "px");
  }

  function openSubmenu(index) {
    var token = ++animationToken;

    if (animationTimer) {
      clearTimeout(animationTimer);
      animationTimer = null;
    }

    renderSubmenu(index);
    positionSubmenu(index);
    submenuPanel.classList.remove("open", "opening", "closing");

    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        if (token !== animationToken || selectedPrimaryIndex !== index) return;

        submenuPanel.classList.add("open", "opening");

        animationTimer = setTimeout(function () {
          if (token !== animationToken) return;

          submenuPanel.classList.remove("opening");
          animationTimer = null;
        }, submenuAnimationMs);
      });
    });
  }

  function closePrimary(index) {
    if (index !== undefined && selectedPrimaryIndex !== index) return;

    pendingPrimaryIndex = -1;

    if (transitionTimer) {
      clearTimeout(transitionTimer);
      transitionTimer = null;
    }

    if (animationTimer) {
      clearTimeout(animationTimer);
      animationTimer = null;
    }

    animationToken++;
    submenuPanel.classList.remove("opening");

    if (submenuPanel.classList.contains("open")) {
      submenuPanel.classList.add("closing");
      submenuPanel.classList.remove("open");

      animationTimer = setTimeout(function () {
        submenuPanel.classList.remove("closing");
        animationTimer = null;
      }, submenuAnimationMs);
    } else {
      submenuPanel.classList.remove("closing");
    }

    selectedPrimaryIndex = -1;
    setPrimaryActive();
  }

  function selectPrimary(index) {
    if (index < 0 || index >= primaryButtons.length) return;

    if (transitionTimer) {
      clearTimeout(transitionTimer);
      transitionTimer = null;
    }

    pendingPrimaryIndex = -1;

    if (selectedPrimaryIndex === index && submenuPanel.classList.contains("open")) {
      setPrimaryActive();
      positionSubmenu(index);
      return;
    }

    var currentIndex = selectedPrimaryIndex;
    var hadVisibleMenu =
      submenuPanel.classList.contains("open") ||
      submenuPanel.classList.contains("opening") ||
      submenuPanel.classList.contains("closing");

    if (animationTimer) {
      clearTimeout(animationTimer);
      animationTimer = null;
    }

    var token = ++animationToken;
    submenuPanel.classList.remove("opening");

    if (hadVisibleMenu) {
      submenuPanel.classList.add("closing");
      submenuPanel.classList.remove("open");

      if (currentIndex >= 0) {
        selectedPrimaryIndex = currentIndex;
        setPrimaryActive();
      }

      pendingPrimaryIndex = index;

      transitionTimer = setTimeout(function () {
        if (token !== animationToken || pendingPrimaryIndex !== index) return;

        submenuPanel.classList.remove("closing");
        selectedPrimaryIndex = index;
        pendingPrimaryIndex = -1;
        setPrimaryActive();
        openSubmenu(index);
        transitionTimer = null;
      }, submenuAnimationMs);

      return;
    } else {
      submenuPanel.classList.remove("closing", "open");
    }

    selectedPrimaryIndex = index;
    setPrimaryActive();
    openSubmenu(index);
  }

  function applyPrimaryFeedback(index, selected) {
    primarySelectedStates[index] = selected;

    if (selected) {
      selectPrimary(index);
      return;
    }

    if (pendingPrimaryIndex === index) {
      pendingPrimaryIndex = -1;

      if (transitionTimer) {
        clearTimeout(transitionTimer);
        transitionTimer = null;
      }

      closePrimary(selectedPrimaryIndex);
      return;
    }

    if (pendingPrimaryIndex >= 0 && selectedPrimaryIndex === index) {
      return;
    }

    if (selectedPrimaryIndex === index) {
      closePrimary(index);
    }
  }

  function subscribePrimaryFeedback() {
    if (!lib) return;

    primaryButtons.forEach(function (buttonConfig, index) {
      if (!buttonConfig.feedbackSignal) return;

      lib.subscribeState("b", buttonConfig.feedbackSignal, function (value) {
        applyPrimaryFeedback(index, isHigh(value));
      });

      if (typeof lib.getState === "function") {
        applyPrimaryFeedback(index, isHigh(lib.getState("b", buttonConfig.feedbackSignal)));
      }
    });
  }

  window.addEventListener("resize", function () {
    if (selectedPrimaryIndex >= 0) {
      positionSubmenu(selectedPrimaryIndex);
    }
  });

  renderPrimaryButtons();
  subscribePrimaryFeedback();

  if (defaultSelectedIndex >= 0) {
    applyPrimaryFeedback(defaultSelectedIndex, true);
  }
})();
</script>
