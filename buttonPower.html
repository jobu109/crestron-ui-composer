<style>
html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent !important;
  touch-action: none;
}

* {
  box-sizing: border-box;
}

.power-button-wrapper {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2%;
  background: transparent !important;
  overflow: hidden;
}

.power-button {
  width: 100%;
  height: 100%;
  min-width: 20px;
  min-height: 20px;
  max-width: 100%;
  max-height: 100%;
  aspect-ratio: 1 / 1;
  border: 1px solid rgba(255, 255, 255, 0.28);
  border-radius: 50%;
  background:
    radial-gradient(
      circle at 35% 25%,
      rgba(255, 255, 255, 0.28),
      rgba(255, 255, 255, 0.08) 36%,
      rgba(80, 80, 80, 0.32) 68%,
      rgba(20, 20, 20, 0.42)
    );
  color: white;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.34),
    inset 0 -10px 18px rgba(0, 0, 0, 0.24),
    inset 0 0 10px rgba(4, 170, 142, 0.16),
    0 0 3px rgba(4, 170, 142, 0.35);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16%;
  transition:
    background 0.2s ease,
    border-color 0.2s ease,
    box-shadow 0.2s ease,
    transform 0.2s ease,
    color 0.2s ease;
  appearance: none;
  -webkit-appearance: none;
  position: relative;
  overflow: hidden;
}

.power-button::before {
  content: "";
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.18),
      rgba(255, 255, 255, 0.03) 44%,
      rgba(4, 170, 142, 0.06)
    );
  pointer-events: none;
}

.power-button::after {
  content: "";
  position: absolute;
  top: 10%;
  left: 18%;
  right: 18%;
  height: 20%;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.12);
  filter: blur(6px);
  pointer-events: none;
}

.power-button-icon {
  width: 100%;
  height: 100%;
  max-width: 82%;
  max-height: 82%;
  color: rgb(220, 45, 45);
  filter:
    drop-shadow(0 0 4px rgba(220, 45, 45, 0.75))
    drop-shadow(0 0 8px rgba(220, 45, 45, 0.42));
  position: relative;
  z-index: 1;
  transition: color 0.2s ease, filter 0.2s ease, transform 0.2s ease;
}

.power-button:hover,
.power-button.pressed {
  transform: scale(0.96);
  border-color: rgba(255, 255, 255, 0.36);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.36),
    inset 0 -10px 18px rgba(0, 0, 0, 0.26),
    inset 0 0 14px rgba(4, 170, 142, 0.18),
    0 0 4px rgba(4, 170, 142, 0.28);
}

.power-button.active .power-button-icon {
  color: rgb(4, 220, 120);
  filter:
    drop-shadow(0 0 4px rgba(4, 220, 120, 0.85))
    drop-shadow(0 0 9px rgba(4, 220, 120, 0.58));
}

.power-button.pressed .power-button-icon {
  transform: scale(0.94);
}
</style>

<div class="power-button-wrapper">
  <button class="power-button" id="power-button" type="button" aria-label="Power">
    <svg class="power-button-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path
        d="M12 3v9"
        fill="none"
        stroke="currentColor"
        stroke-width="2.7"
        stroke-linecap="round"
      ></path>
      <path
        d="M7.05 6.75a7 7 0 1 0 9.9 0"
        fill="none"
        stroke="currentColor"
        stroke-width="2.7"
        stroke-linecap="round"
      ></path>
    </svg>
  </button>
</div>

<script>
(function () {
  var pressSignal = "81";
  var feedbackSignal = "91";

  // Contract-name example:
  // var pressSignal = "Power.Toggle.Press";
  // var feedbackSignal = "Power.Toggle.IsOn";

  function getCrComLib() {
    try {
      return window.CrComLib ||
        (window.parent && window.parent.CrComLib) ||
        (window.top && window.top.CrComLib) ||
        null;
    } catch (e) {
      return window.CrComLib || null;
    }
  }

  function isHigh(value) {
    return value === true || value === 1 || value === "1";
  }

  var lib = getCrComLib();
  var button = document.getElementById("power-button");

  function publishPressed(value) {
    button.classList.toggle("pressed", value);

    if (lib && pressSignal) {
      lib.publishEvent("b", pressSignal, value);
    }
  }

  button.addEventListener("pointerdown", function (event) {
    publishPressed(true);
    event.preventDefault();
  });

  button.addEventListener("pointerup", function () {
    publishPressed(false);
  });

  button.addEventListener("pointerleave", function () {
    publishPressed(false);
  });

  button.addEventListener("pointercancel", function () {
    publishPressed(false);
  });

  if (lib && feedbackSignal) {
    lib.subscribeState("b", feedbackSignal, function (value) {
      button.classList.toggle("active", isHigh(value));
    });
  }
})();
</script>
