<style>
html,
body {
  margin: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: transparent;
  touch-action: none;
}

* {
  box-sizing: border-box;
}

.oval-wrapper {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8vw;
}

.oval-btn {
  width: 100%;
  height: 100%;
  min-width: 80px;
  min-height: 64px;
  border: 2px solid white;
  border-radius: 999px;
  background: #555;
  color: white;
  cursor: pointer;
  box-shadow: 0 0 8px rgb(4, 170, 142);
  transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(8px, 5vw, 18px);
  padding: clamp(10px, 5vw, 22px);
  font-family: "Segoe UI", sans-serif;
}

.oval-btn.no-label {
  gap: 0;
}

.oval-btn:hover,
.oval-btn.pressed {
  background: #777;
  transform: scale(0.92);
  box-shadow: 0 0 15px rgb(4, 170, 142);
}

.oval-btn.active {
  background: #0fae8e;
  box-shadow: 0 0 25px rgb(4, 170, 142);
}

.oval-btn-icon {
  width: clamp(44px, 18vmin, 60px);
  height: clamp(44px, 18vmin, 60px);
  flex: 0 0 auto;
}

.oval-btn-label {
  color: white;
  font-size: clamp(14px, 10vmin, 32px);
  font-weight: 600;
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.oval-btn-label:empty {
  display: none;
}
</style>

<div class="oval-wrapper">
  <button class="oval-btn" id="oval-btn" type="button">
    <svg class="oval-btn-icon" id="oval-btn-icon" viewBox="0 0 24 24" aria-hidden="true"></svg>
    <span class="oval-btn-label" id="oval-btn-label"></span>
  </button>
</div>

<script>
(function () {
  var pressSignal = "121";
  var feedbackSignal = "131";
  var labelSignal = "121";

  // Contract-name example:
  // var pressSignal = "Volume.Down.Press";
  // var feedbackSignal = "Volume.Down.Selected";
  // var labelSignal = "Volume.Down.Label";

  var defaultLabel = "";
  var defaultIcon = "volumeDown";

  function getCrComLib() {
    try {
      return window.CrComLib ||
        (window.parent && window.parent.CrComLib) ||
        (window.top && window.top.CrComLib) ||
        null;
    } catch (e) {
      return window.CrComLib || null;
    }
  }

  function getIconSvg(name) {
    var icons = {
      volumeDown:
        '<path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"></path>' +
        '<path d="M16 9.5a4 4 0 010 5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>',

      volumeUp:
        '<path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"></path>' +
        '<path d="M16 8a5 5 0 010 8M18.5 5.5a8.5 8.5 0 010 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>',

      minus:
        '<path d="M5 12h14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>',

      plus:
        '<path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>',

      power:
        '<path d="M12 3v9" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"></path>' +
        '<path d="M7 6.5a7 7 0 1010 0" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"></path>'
    };

    return icons[name] || icons.volumeDown;
  }

  var lib = getCrComLib();
  var button = document.getElementById("oval-btn");
  var label = document.getElementById("oval-btn-label");
  var icon = document.getElementById("oval-btn-icon");

  function setLabel(text) {
    label.textContent = text || "";
    button.classList.toggle("no-label", !label.textContent);
  }

  setLabel(defaultLabel);
  icon.innerHTML = getIconSvg(defaultIcon);

  function publishPressed(value) {
    button.classList.toggle("pressed", value);

    if (lib) {
      lib.publishEvent("b", pressSignal, value);
    }
  }

  button.addEventListener("pointerdown", function (event) {
    publishPressed(true);
    event.preventDefault();
  });

  button.addEventListener("pointerup", function () {
    publishPressed(false);
  });

  button.addEventListener("pointerleave", function () {
    publishPressed(false);
  });

  button.addEventListener("pointercancel", function () {
    publishPressed(false);
  });

  if (lib) {
    lib.subscribeState("b", feedbackSignal, function (value) {
      button.classList.toggle(
        "active",
        value === true || value === 1 || value === "1"
      );
    });

    if (labelSignal) {
      lib.subscribeState("s", labelSignal, function (value) {
        setLabel(value || defaultLabel);
      });
    }
  }
})();
</script>
