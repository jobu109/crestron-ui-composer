<style>
html, body {
  margin: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: transparent;
  touch-action: none;
}

* { box-sizing: border-box; }

.glass-carousel-container {
  --label-color: white;
  --label-active-color: #04aa8e;
  --label-inactive-color: white;

  position: fixed;
  inset: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.carousel-controls {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: clamp(8px, 4vh, 32px) 0;
  z-index: 5;
  pointer-events: none;
}

.carousel-controls button {
  width: clamp(36px, 14vmin, 60px);
  height: clamp(36px, 14vmin, 60px);
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  color: gray;
  font-size: clamp(20px, 8vmin, 34px);
  cursor: pointer;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 12px rgba(4,170,142,0.4);
  pointer-events: auto;
}

.glass-track-wrapper {
  width: 100%;
  height: 100%;
  overflow: hidden;
  position: relative;
}

.glass-track {
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: transform 0.4s ease-in-out;
  will-change: transform;
}

.glass-slide {
  width: min(70vw, 340px);
  height: min(32vh, 180px);
  min-width: 120px;
  min-height: 90px;
  margin: clamp(8px, 2vh, 18px) 0;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(16px);
  border-radius: 18px;
  box-shadow: inset 0 0 20px rgba(255,255,255,0.15), 0 4px 24px rgba(0,0,0,0.4);
  flex-shrink: 0;
  transition: box-shadow 0.3s ease, transform 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.glass-slide.active {
  box-shadow: 0 0 20px rgba(4,170,142,0.8), 0 0 40px rgba(4,170,142,0.4);
  transform: scale(1.08);
}

.glass-label {
  color: var(--label-color);
  font-family: "Segoe UI", sans-serif;
  font-size: clamp(16px, 8vmin, 34px);
  font-weight: 600;
  text-align: center;
}

.glass-slide:not(.active) .glass-label {
  color: var(--label-inactive-color);
}

.glass-slide.active .glass-label {
  color: var(--label-active-color);
}
</style>

<div class="glass-carousel-container">
  <div class="carousel-controls">
    <button class="glass-carousel-prev" type="button">&#9650;</button>
    <button class="glass-carousel-next" type="button">&#9660;</button>
  </div>
  <div class="glass-track-wrapper">
    <div class="glass-track" id="glass-track"></div>
  </div>
</div>

<script>
(function () {
  var slideCountSignal = "42";

  var pressBaseSignal = 100;
  var feedbackBaseSignal = 200;
  var labelBaseSignal = 300;

  var maxSlides = 20;
  var defaultSlideCount = 5;

  function getCrComLib() {
    try {
      return window.CrComLib ||
        (window.parent && window.parent.CrComLib) ||
        (window.top && window.top.CrComLib) ||
        null;
    } catch (e) {
      return window.CrComLib || null;
    }
  }

  var lib = getCrComLib();
  var currentIndex = 0;
  var slideCount = defaultSlideCount;
  var labels = [];
  var startY = 0;

  var track = document.getElementById("glass-track");
  var wrapper = document.querySelector(".glass-track-wrapper");

  for (var i = 0; i < maxSlides; i++) {
    labels[i] = "Source " + (i + 1);
  }

  function getPressSignal(index) {
    return String(pressBaseSignal + index);
  }

  function getFeedbackSignal(index) {
    return String(feedbackBaseSignal + index);
  }

  function getLabelSignal(index) {
    return String(labelBaseSignal + index);
  }

  function renderSlides() {
    track.innerHTML = "";

    for (var i = 0; i < slideCount; i++) {
      var slide = document.createElement("div");
      slide.className = "glass-slide" + (i === currentIndex ? " active" : "");

      var span = document.createElement("span");
      span.className = "glass-label";
      span.textContent = labels[i] || ("Slide " + (i + 1));

      slide.appendChild(span);
      track.appendChild(slide);

      (function (index) {
        slide.addEventListener("click", function () {
          setActiveSlide(index, true);
        });
      })(i);
    }

    requestAnimationFrame(updateTransform);
  }

  function getSlides() {
    return Array.prototype.slice.call(document.querySelectorAll(".glass-slide"));
  }

  function updateTransform() {
    var slides = getSlides();
    if (!slides.length) return;

    var slide = slides[currentIndex];
    var offset = (wrapper.clientHeight / 2) - (slide.offsetTop + slide.offsetHeight / 2);
    track.style.transform = "translateY(" + offset + "px)";
  }

  function pulseSlidePress(index) {
    if (!lib) return;

    var signal = getPressSignal(index);
    lib.publishEvent("b", signal, true);

    setTimeout(function () {
      lib.publishEvent("b", signal, false);
    }, 100);
  }

  function setActiveSlide(index, publish) {
    var slides = getSlides();
    if (!slides.length) return;

    index = Math.max(0, Math.min(slideCount - 1, index));

    slides.forEach(function (slide) {
      slide.classList.remove("active");
    });

    currentIndex = index;
    slides[currentIndex].classList.add("active");
    updateTransform();

    if (publish) {
      pulseSlidePress(currentIndex);
    }
  }

  function move(direction) {
    var nextIndex = (currentIndex + direction + slideCount) % slideCount;
    setActiveSlide(nextIndex, true);
  }

  function setSlideCount(value) {
    var count = Math.round(Number(value));

    if (!Number.isFinite(count) || count < 1) {
      count = defaultSlideCount;
    }

    slideCount = Math.max(1, Math.min(maxSlides, count));
    currentIndex = Math.min(currentIndex, slideCount - 1);

    renderSlides();
  }

  document.querySelector(".glass-carousel-prev").addEventListener("click", function () {
    move(-1);
  });

  document.querySelector(".glass-carousel-next").addEventListener("click", function () {
    move(1);
  });

  track.addEventListener("pointerdown", function (event) {
    startY = event.clientY;
  });

  track.addEventListener("pointerup", function (event) {
    var diff = event.clientY - startY;

    if (diff > 50) move(-1);
    if (diff < -50) move(1);
  });

  window.addEventListener("resize", updateTransform);

  renderSlides();

  if (lib) {
    lib.subscribeState("n", slideCountSignal, setSlideCount);

    for (var i = 0; i < maxSlides; i++) {
      (function (index) {
        lib.subscribeState("b", getFeedbackSignal(index), function (value) {
          if (value === true || value === 1 || value === "1") {
            setActiveSlide(index, false);
          }
        });

        lib.subscribeState("s", getLabelSignal(index), function (value) {
          if (value) {
            labels[index] = value;
            renderSlides();
          }
        });
      })(i);
    }
  }
})();
</script>
