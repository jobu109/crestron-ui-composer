<style>
html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}

* {
  box-sizing: border-box;
}

.glass-wrapper {
  width: 100%;
  height: 100%;
  display: block;
  padding: 4px;
  background: transparent;
  overflow: hidden;
}

.glass-panel {
  width: 100%;
  height: 100%;
  border-radius: 10px;
  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.24),
      rgba(52, 68, 68, 0.26) 42%,
      rgba(4, 170, 142, 0.16)
    );
  border: 1px solid rgba(255, 255, 255, 0.36);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.42),
    inset 0 -24px 42px rgba(4, 170, 142, 0.1),
    0 0 14px rgba(4, 170, 142, 0.45),
    0 8px 18px rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(14px) saturate(135%);
  -webkit-backdrop-filter: blur(14px) saturate(135%);
  position: relative;
  overflow: hidden;
}

.glass-panel::before {
  content: "";
  position: absolute;
  inset: 1px;
  border-radius: 9px;
  background:
    linear-gradient(
      120deg,
      rgba(255, 255, 255, 0.22),
      rgba(255, 255, 255, 0.06) 34%,
      rgba(255, 255, 255, 0) 58%
    );
  pointer-events: none;
}

.glass-panel::after {
  content: "";
  position: absolute;
  left: 8%;
  right: 8%;
  top: 8%;
  height: 22%;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.12);
  filter: blur(18px);
  pointer-events: none;
}
</style>

<div class="glass-wrapper">
  <div class="glass-panel"></div>
</div>
