<style>
html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  touch-action: none;
}

* {
  box-sizing: border-box;
}

.keyboard-wrap {
  --radius: clamp(8px, 2.2vmin, 18px);
  --teal: rgb(4, 170, 142);
  --teal-bright: rgb(4, 220, 185);

  width: 100%;
  height: 100%;
  padding: clamp(6px, 2vmin, 16px);
  display: flex;
  align-items: stretch;
  justify-content: stretch;
  font-family: "Segoe UI", sans-serif;
  background: transparent;
}

.keyboard {
  width: 100%;
  height: 100%;
  min-width: 260px;
  min-height: 150px;
  padding: clamp(6px, 2vmin, 14px);
  border-radius: var(--radius);
  background:
    linear-gradient(
      145deg,
      rgba(34, 42, 42, 0.96),
      rgba(15, 18, 18, 0.96)
    );
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.08),
    inset 0 -10px 24px rgba(0, 0, 0, 0.72),
    0 0 14px rgba(4, 170, 142, 0.28);
  overflow: hidden;
  position: relative;
}

.keyboard::before {
  content: "";
  position: absolute;
  left: -95%;
  top: -85%;
  width: 72%;
  height: 260%;
  background:
    linear-gradient(
      135deg,
      transparent 0%,
      transparent 34%,
      rgba(4, 170, 142, 0.02) 42%,
      rgba(4, 170, 142, 0.22) 50%,
      rgba(255, 255, 255, 0.06) 54%,
      rgba(4, 170, 142, 0.06) 61%,
      transparent 72%,
      transparent 100%
    );
  filter: blur(10px);
  pointer-events: none;
  animation: keyboard-rolling-glow 5.5s linear infinite;
}

.keyboard-inner {
  width: 100%;
  height: 100%;
  padding: clamp(5px, 1.5vmin, 10px);
  border-radius: calc(var(--radius) * 0.55);
  background:
    linear-gradient(
      145deg,
      rgba(34, 34, 34, 0.9),
      rgba(20, 26, 26, 0.9)
    );
  box-shadow:
    inset 0 6px 12px rgba(0, 0, 0, 0.72),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
  display: grid;
  grid-template-rows: repeat(5, 1fr);
  gap: clamp(4px, 1.1vmin, 8px);
  position: relative;
  z-index: 1;
  overflow: hidden;
}

.keyboard-inner::before {
  content: "";
  position: absolute;
  left: -105%;
  top: -95%;
  width: 76%;
  height: 280%;
  background:
    linear-gradient(
      135deg,
      transparent 0%,
      rgba(4, 170, 142, 0.02) 42%,
      rgba(4, 170, 142, 0.16) 50%,
      rgba(255, 255, 255, 0.045) 54%,
      transparent 68%
    );
  filter: blur(8px);
  pointer-events: none;
  animation: keyboard-rolling-glow 5.5s linear infinite;
}

.keyboard-row {
  display: flex;
  gap: clamp(4px, 1.1vmin, 8px);
  min-height: 0;
  position: relative;
  z-index: 1;
}

.key {
  position: relative;
  flex: 1 1 0;
  min-width: 0;
  height: 100%;
  padding: clamp(2px, 0.7vmin, 5px) clamp(2px, 0.7vmin, 5px) clamp(4px, 1vmin, 8px);
  border-radius: calc(var(--radius) * 0.45);
  overflow: hidden;
  transform: translate3d(0, 0, 0);
  background: rgba(4, 170, 142, 0.18);
  box-shadow: 0 0 8px rgba(4, 170, 142, 0.24);
}

.key-content {
  position: relative;
  z-index: 1;
  top: calc(clamp(2px, 0.7vmin, 5px) * -1);
  width: 100%;
  height: 100%;
  border: 1px solid rgba(4, 170, 142, 0.28);
  border-radius: calc(var(--radius) * 0.34);
  background:
    linear-gradient(
      145deg,
      rgba(42, 48, 48, 0.96),
      rgba(14, 16, 16, 0.96)
    );
  color: var(--teal-bright);
  text-shadow:
    0 0 6px rgba(4, 220, 185, 0.58),
    0 0 14px rgba(4, 170, 142, 0.36);
  box-shadow:
    0 clamp(3px, 0.9vmin, 7px) rgba(0, 0, 0, 0.62),
    inset 0 1px 0 rgba(255, 255, 255, 0.08),
    inset 0 -8px 16px rgba(4, 170, 142, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 clamp(3px, 0.9vmin, 8px);
  font-family: "Segoe UI", sans-serif;
  font-size: clamp(10px, 3.4vmin, 24px);
  font-weight: 800;
  line-height: 1;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  user-select: none;
  appearance: none;
  -webkit-appearance: none;
  transition:
    top 0.1s ease-in-out,
    box-shadow 0.1s ease-in-out,
    background 0.1s ease-in-out,
    border-color 0.1s ease-in-out,
    transform 0.1s ease-in-out,
    color 0.1s ease-in-out;
}

.key-content::after {
  content: "";
  position: absolute;
  inset: -35%;
  background:
    radial-gradient(
      circle,
      rgba(255, 255, 255, 0.86) 0%,
      rgba(4, 220, 185, 0.52) 22%,
      rgba(4, 170, 142, 0.18) 46%,
      transparent 64%
    );
  opacity: 0;
  transform: scale(0.2);
  pointer-events: none;
}

.key-content.pressed,
.key-content.active-toggle {
  top: 0;
  transform: translateY(2px) scale(0.97);
  color: white;
  border-color: rgba(255, 255, 255, 0.94);
  text-shadow:
    0 1px 3px rgba(0, 0, 0, 0.74),
    0 0 10px rgba(255, 255, 255, 0.78),
    0 0 22px rgba(4, 220, 185, 0.92);
  box-shadow:
    0 0 18px rgba(4, 220, 185, 0.82),
    0 0 4px rgba(255, 255, 255, 0.7),
    inset 0 2px 8px rgba(0, 0, 0, 0.56),
    inset 0 0 20px rgba(255, 255, 255, 0.24);
  background:
    linear-gradient(
      145deg,
      rgba(255, 255, 255, 0.3),
      rgba(4, 220, 185, 0.82) 42%,
      rgba(4, 120, 104, 0.98)
    );
}

.key-content.pressed::after {
  animation: key-light-wave 0.48s ease-out forwards;
}

.key.wide {
  flex-grow: 1.55;
}

.key.xwide {
  flex-grow: 2.15;
}

.key.space {
  flex-grow: 5.6;
}

.key.small-text .key-content {
  font-size: clamp(8px, 2.4vmin, 16px);
}

@keyframes keyboard-rolling-glow {
  0% {
    transform: translate3d(0, 0, 0);
    opacity: 0;
  }

  12% {
    opacity: 1;
  }

  72% {
    opacity: 1;
  }

  100% {
    transform: translate3d(270%, 95%, 0);
    opacity: 0;
  }
}

@keyframes key-light-wave {
  0% {
    opacity: 1;
    transform: scale(0.2);
  }

  100% {
    opacity: 0;
    transform: scale(1.75);
  }
}
</style>

<div class="keyboard-wrap">
  <div class="keyboard">
    <div class="keyboard-inner">
      <div class="keyboard-row">
        <div class="key"><button class="key-content" type="button" data-value="1">1</button></div>
        <div class="key"><button class="key-content" type="button" data-value="2">2</button></div>
        <div class="key"><button class="key-content" type="button" data-value="3">3</button></div>
        <div class="key"><button class="key-content" type="button" data-value="4">4</button></div>
        <div class="key"><button class="key-content" type="button" data-value="5">5</button></div>
        <div class="key"><button class="key-content" type="button" data-value="6">6</button></div>
        <div class="key"><button class="key-content" type="button" data-value="7">7</button></div>
        <div class="key"><button class="key-content" type="button" data-value="8">8</button></div>
        <div class="key"><button class="key-content" type="button" data-value="9">9</button></div>
        <div class="key"><button class="key-content" type="button" data-value="0">0</button></div>
        <div class="key wide small-text"><button class="key-content" type="button" data-action="backspace">BACK</button></div>
      </div>

      <div class="keyboard-row">
        <div class="key wide small-text"><button class="key-content" type="button" data-value="TAB">TAB</button></div>
        <div class="key"><button class="key-content" type="button" data-value="Q">Q</button></div>
        <div class="key"><button class="key-content" type="button" data-value="W">W</button></div>
        <div class="key"><button class="key-content" type="button" data-value="E">E</button></div>
        <div class="key"><button class="key-content" type="button" data-value="R">R</button></div>
        <div class="key"><button class="key-content" type="button" data-value="T">T</button></div>
        <div class="key"><button class="key-content" type="button" data-value="Y">Y</button></div>
        <div class="key"><button class="key-content" type="button" data-value="U">U</button></div>
        <div class="key"><button class="key-content" type="button" data-value="I">I</button></div>
        <div class="key"><button class="key-content" type="button" data-value="O">O</button></div>
        <div class="key"><button class="key-content" type="button" data-value="P">P</button></div>
      </div>

      <div class="keyboard-row">
        <div class="key xwide small-text"><button class="key-content" id="caps-key" type="button" data-action="caps">CAPS</button></div>
        <div class="key"><button class="key-content" type="button" data-value="A">A</button></div>
        <div class="key"><button class="key-content" type="button" data-value="S">S</button></div>
        <div class="key"><button class="key-content" type="button" data-value="D">D</button></div>
        <div class="key"><button class="key-content" type="button" data-value="F">F</button></div>
        <div class="key"><button class="key-content" type="button" data-value="G">G</button></div>
        <div class="key"><button class="key-content" type="button" data-value="H">H</button></div>
        <div class="key"><button class="key-content" type="button" data-value="J">J</button></div>
        <div class="key"><button class="key-content" type="button" data-value="K">K</button></div>
        <div class="key"><button class="key-content" type="button" data-value="L">L</button></div>
        <div class="key xwide small-text"><button class="key-content" type="button" data-action="enter">ENTER</button></div>
      </div>

      <div class="keyboard-row">
        <div class="key xwide small-text"><button class="key-content shift-key" type="button" data-action="shift">SHIFT</button></div>
        <div class="key"><button class="key-content" type="button" data-value="Z">Z</button></div>
        <div class="key"><button class="key-content" type="button" data-value="X">X</button></div>
        <div class="key"><button class="key-content" type="button" data-value="C">C</button></div>
        <div class="key"><button class="key-content" type="button" data-value="V">V</button></div>
        <div class="key"><button class="key-content" type="button" data-value="B">B</button></div>
        <div class="key"><button class="key-content" type="button" data-value="N">N</button></div>
        <div class="key"><button class="key-content" type="button" data-value="M">M</button></div>
        <div class="key"><button class="key-content" type="button" data-value=".">.</button></div>
        <div class="key xwide small-text"><button class="key-content shift-key" type="button" data-action="shift">SHIFT</button></div>
      </div>

      <div class="keyboard-row">
        <div class="key wide small-text"><button class="key-content" type="button" data-value=",">,</button></div>
        <div class="key wide small-text"><button class="key-content" type="button" data-value="-">-</button></div>
        <div class="key space"><button class="key-content" type="button" data-action="space">SPACE</button></div>
        <div class="key wide small-text"><button class="key-content" type="button" data-value="_">_</button></div>
        <div class="key wide small-text"><button class="key-content" type="button" data-value="@">@</button></div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  var keySerialOutSignal = "81";
  var enterDigitalOutSignal = "81";

  var clearDelayAfterEnterMs = 120;

  function getCrComLib() {
    try {
      return window.CrComLib ||
        (window.parent && window.parent.CrComLib) ||
        (window.top && window.top.CrComLib) ||
        null;
    } catch (e) {
      return window.CrComLib || null;
    }
  }

  var lib = getCrComLib();
  var typedText = "";
  var capsOn = false;
  var shiftOn = false;
  var capsButton = document.getElementById("caps-key");
  var shiftButtons = document.querySelectorAll(".shift-key");

  function publishText() {
    if (lib && keySerialOutSignal) {
      lib.publishEvent("s", keySerialOutSignal, typedText);
    }
  }

  function pulseDigital(signal) {
    if (!lib || !signal) return;

    lib.publishEvent("b", signal, true);

    setTimeout(function () {
      lib.publishEvent("b", signal, false);
    }, 100);
  }

  function setButtonPressed(button, pressed) {
    button.classList.toggle("pressed", pressed);
  }

  function updateToggleButtons() {
    if (capsButton) {
      capsButton.classList.toggle("active-toggle", capsOn);
    }

    shiftButtons.forEach(function (button) {
      button.classList.toggle("active-toggle", shiftOn);
    });
  }

  function applyCase(value) {
    if (value.length !== 1 || !/[a-z]/i.test(value)) {
      return value;
    }

    return capsOn || shiftOn ? value.toUpperCase() : value.toLowerCase();
  }

  function handleKey(button) {
    var action = button.getAttribute("data-action");
    var value = button.getAttribute("data-value");

    if (action === "backspace") {
      typedText = typedText.slice(0, -1);
      publishText();
      return;
    }

    if (action === "space") {
      typedText += " ";
      publishText();
      return;
    }

    if (action === "caps") {
      capsOn = !capsOn;
      updateToggleButtons();
      return;
    }

    if (action === "shift") {
      shiftOn = !shiftOn;
      updateToggleButtons();
      return;
    }

    if (action === "enter") {
      publishText();
      pulseDigital(enterDigitalOutSignal);

      setTimeout(function () {
        typedText = "";
        publishText();
      }, clearDelayAfterEnterMs);

      return;
    }

    if (value === "TAB") {
      typedText += " ";
      publishText();
      return;
    }

    if (value) {
      typedText += applyCase(value);
      publishText();

      if (shiftOn) {
        shiftOn = false;
        updateToggleButtons();
      }
    }
  }

  document.querySelectorAll(".key-content").forEach(function (button) {
    button.addEventListener("pointerdown", function (event) {
      setButtonPressed(button, true);
      handleKey(button);
      event.preventDefault();
    });

    button.addEventListener("pointerup", function () {
      setButtonPressed(button, false);
    });

    button.addEventListener("pointerleave", function () {
      setButtonPressed(button, false);
    });

    button.addEventListener("pointercancel", function () {
      setButtonPressed(button, false);
    });
  });

  updateToggleButtons();
  publishText();
})();
</script>
