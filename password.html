<style>
html,
body {
  margin: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: transparent;
  touch-action: none;
}

* {
  box-sizing: border-box;
}

.keypad-wrapper {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: stretch;
  justify-content: stretch;
  padding: 5vw;
  font-family: "Segoe UI", sans-serif;
}

.keypad {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-rows: minmax(52px, 0.9fr) repeat(5, 1fr);
  gap: clamp(6px, 2vmin, 12px);
  position: relative;
}

.keypad-display {
  width: 100%;
  min-height: 48px;
  border-radius: 8px;
  background: rgba(160, 160, 160, 0.28);
  border: 1px solid rgba(255, 255, 255, 0.22);
  box-shadow:
    inset 0 0 14px rgba(255, 255, 255, 0.08),
    0 0 12px rgba(4, 170, 142, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 12px;
  overflow: hidden;
  transition: opacity 0.25s ease, transform 0.25s ease;
}

.keypad-display-text {
  width: 100%;
  color: white;
  font-size: clamp(24px, 12vmin, 52px);
  font-weight: 700;
  line-height: 1;
  text-align: center;
  letter-spacing: 0.18em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow: 0 0 12px rgba(255, 255, 255, 0.55);
}

.keypad-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: clamp(6px, 2vmin, 12px);
  min-height: 0;
  transition: opacity 0.25s ease, transform 0.25s ease;
}

.keypad-button {
  width: 100%;
  height: 100%;
  min-width: 0;
  min-height: 0;
  border: 1px solid rgba(255, 255, 255, 0.24);
  border-radius: 8px;
  background: rgba(160, 160, 160, 0.42);
  color: white;
  box-shadow: 0 0 10px rgba(4, 170, 142, 0.35);
  cursor: pointer;
  transition:
    background 0.22s cubic-bezier(0.67, 0.17, 0.4, 0.83),
    box-shadow 0.22s cubic-bezier(0.67, 0.17, 0.4, 0.83),
    transform 0.22s cubic-bezier(0.67, 0.17, 0.4, 0.83),
    border-color 0.22s cubic-bezier(0.67, 0.17, 0.4, 0.83),
    border-radius 0.32s cubic-bezier(0.67, 0.17, 0.4, 0.83),
    width 0.32s cubic-bezier(0.67, 0.17, 0.4, 0.83),
    height 0.32s cubic-bezier(0.67, 0.17, 0.4, 0.83);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 8px;
  font-family: "Segoe UI", sans-serif;
  font-size: clamp(22px, 13vmin, 54px);
  font-weight: 700;
  line-height: 1;
  text-align: center;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  appearance: none;
  -webkit-appearance: none;
}

.keypad-button.action {
  font-size: clamp(13px, 6vmin, 26px);
  background: rgba(120, 120, 120, 0.48);
}

.keypad-button.enter {
  grid-column: 1 / -1;
  background: rgba(4, 170, 142, 0.62);
  border-color: rgba(4, 170, 142, 0.95);
  box-shadow: 0 0 18px rgba(4, 170, 142, 0.78);
  font-size: clamp(18px, 8vmin, 34px);
}

.keypad-button:hover,
.keypad-button.pressed {
  background: rgba(4, 170, 142, 0.72);
  border-color: rgba(4, 170, 142, 0.95);
  box-shadow: 0 0 24px rgba(4, 170, 142, 0.9);
  transform: scale(0.96);
}

.keypad-button.enter:hover,
.keypad-button.enter.pressed {
  background: rgba(4, 170, 142, 0.82);
  box-shadow: 0 0 28px rgba(4, 170, 142, 1);
}

.keypad.success .keypad-display,
.keypad.error .keypad-display,
.keypad.success .keypad-row:not(.enter-row),
.keypad.error .keypad-row:not(.enter-row) {
  opacity: 0;
  transform: scale(0.94);
  pointer-events: none;
}

.keypad.success .enter-row,
.keypad.error .enter-row {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(14px, 4vmin, 28px);
  pointer-events: none;
}

.keypad.success .keypad-button.enter,
.keypad.error .keypad-button.enter {
  grid-column: auto;
  width: min(62vw, 62vh, 220px);
  height: min(62vw, 62vh, 220px);
  min-width: 72px;
  min-height: 72px;
  border-radius: 50%;
  padding: 18%;
  border-color: rgba(255, 255, 255, 0.42);
  transform: rotate(-180deg);
  z-index: 5;
}

.keypad.success .keypad-button.enter {
  background: rgb(46, 190, 108);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.4),
    inset 0 -18px 28px rgba(0, 0, 0, 0.18),
    0 0 24px rgba(46, 190, 108, 0.88),
    0 0 44px rgba(46, 190, 108, 0.48);
}

.keypad.error .keypad-button.enter {
  background: rgb(210, 45, 45);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.4),
    inset 0 -18px 28px rgba(0, 0, 0, 0.22),
    0 0 24px rgba(210, 45, 45, 0.88),
    0 0 44px rgba(210, 45, 45, 0.48);
}

.keypad-check-icon,
.keypad-x-icon {
  width: 72%;
  height: 72%;
  color: white;
  transform: rotate(180deg);
}

.keypad-check-icon {
  filter:
    drop-shadow(0 0 8px rgba(255, 255, 255, 0.82))
    drop-shadow(0 0 18px rgba(46, 190, 108, 0.92));
}

.keypad-x-icon {
  filter:
    drop-shadow(0 0 8px rgba(255, 255, 255, 0.82))
    drop-shadow(0 0 18px rgba(210, 45, 45, 0.92));
}

.keypad-result-message {
  display: none;
  width: min(92vw, 720px);
  color: white;
  font-size: clamp(22px, 7vmin, 52px);
  font-weight: 900;
  line-height: 1.05;
  text-align: center;
  text-shadow:
    0 2px 5px rgba(0, 0, 0, 0.82),
    0 0 14px rgba(255, 255, 255, 0.58);
}

.keypad.success .keypad-result-message,
.keypad.error .keypad-result-message {
  display: block;
}
</style>

<div class="keypad-wrapper">
  <div class="keypad" id="keypad">
    <div class="keypad-display">
      <div class="keypad-display-text" id="keypad-display-text"></div>
    </div>

    <div class="keypad-row">
      <button class="keypad-button" type="button" data-key="1">1</button>
      <button class="keypad-button" type="button" data-key="2">2</button>
      <button class="keypad-button" type="button" data-key="3">3</button>
    </div>

    <div class="keypad-row">
      <button class="keypad-button" type="button" data-key="4">4</button>
      <button class="keypad-button" type="button" data-key="5">5</button>
      <button class="keypad-button" type="button" data-key="6">6</button>
    </div>

    <div class="keypad-row">
      <button class="keypad-button" type="button" data-key="7">7</button>
      <button class="keypad-button" type="button" data-key="8">8</button>
      <button class="keypad-button" type="button" data-key="9">9</button>
    </div>

    <div class="keypad-row">
      <button class="keypad-button action" type="button" data-action="clear">CLEAR</button>
      <button class="keypad-button" type="button" data-key="0">0</button>
      <button class="keypad-button action" type="button" data-action="backspace">BACK</button>
    </div>

    <div class="keypad-row enter-row">
      <button class="keypad-button enter" id="keypad-enter-button" type="button" data-action="enter">ENTER</button>
      <div class="keypad-result-message" id="keypad-result-message"></div>
    </div>
  </div>
</div>

<script>
(function () {
  var digitSignals = {
    0: "200",
    1: "201",
    2: "202",
    3: "203",
    4: "204",
    5: "205",
    6: "206",
    7: "207",
    8: "208",
    9: "209"
  };

  var backspaceSignal = "210";
  var clearSignal = "211";
  var enterSignal = "212";
  var correctPasswordSignal = "213";
  var wrongPasswordSignal = "214";
  var passwordSerialOutSignal = "200";

  var maxDigits = 8;
  var maskCharacter = "*";

  var enterText = "ENTER";
  var checkMarkup =
    '<svg class="keypad-check-icon" viewBox="0 0 58 45" aria-hidden="true">' +
      '<path fill="currentColor" d="M19.11 44.64L0.27 25.81l5.66-5.66 13.18 13.18L52.07 0.38l5.65 5.65z"></path>' +
    '</svg>';

  var xMarkup =
    '<svg class="keypad-x-icon" viewBox="0 0 48 48" aria-hidden="true">' +
      '<path fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" d="M12 12l24 24M36 12L12 36"></path>' +
    '</svg>';

  function getCrComLib() {
    try {
      return window.CrComLib ||
        (window.parent && window.parent.CrComLib) ||
        (window.top && window.top.CrComLib) ||
        null;
    } catch (e) {
      return window.CrComLib || null;
    }
  }

  function isHigh(value) {
    return value === true || value === 1 || value === "1";
  }

  var lib = getCrComLib();
  var keypad = document.getElementById("keypad");
  var displayText = document.getElementById("keypad-display-text");
  var enterButton = document.getElementById("keypad-enter-button");
  var resultMessage = document.getElementById("keypad-result-message");
  var enteredDigits = "";
  var correctState = false;
  var wrongState = false;

  function pulseSignal(signal) {
    if (!lib || !signal) return;

    lib.publishEvent("b", signal, true);

    setTimeout(function () {
      lib.publishEvent("b", signal, false);
    }, 100);
  }

  function publishPasswordSerial() {
    if (lib && passwordSerialOutSignal) {
      lib.publishEvent("s", passwordSerialOutSignal, enteredDigits);
    }
  }

  function setPressed(button, pressed) {
    button.classList.toggle("pressed", pressed);
  }

  function updateDisplay() {
    displayText.textContent = new Array(enteredDigits.length + 1).join(maskCharacter);
  }

  function updateResultState() {
    keypad.classList.remove("success", "error");

    if (correctState) {
      keypad.classList.add("success");
      enterButton.innerHTML = checkMarkup;
      resultMessage.textContent = "CORRECT";
      enteredDigits = "";
      updateDisplay();
      publishPasswordSerial();
      return;
    }

    if (wrongState) {
      keypad.classList.add("error");
      enterButton.innerHTML = xMarkup;
      resultMessage.textContent = "INCORRECT, TRY AGAIN";
      enteredDigits = "";
      updateDisplay();
      publishPasswordSerial();
      return;
    }

    enterButton.innerHTML = enterText;
    resultMessage.textContent = "";
  }

  function isResultShowing() {
    return correctState || wrongState;
  }

  function pressDigit(button, digit) {
    if (isResultShowing()) return;

    if (enteredDigits.length < maxDigits) {
      enteredDigits += digit;
    }

    updateDisplay();
    publishPasswordSerial();
    pulseSignal(digitSignals[digit]);
    setPressed(button, true);

    setTimeout(function () {
      setPressed(button, false);
    }, 120);
  }

  function pressAction(button, action) {
    if (isResultShowing()) return;

    if (action === "backspace") {
      enteredDigits = enteredDigits.slice(0, -1);
      publishPasswordSerial();
      pulseSignal(backspaceSignal);
    }

    if (action === "clear") {
      enteredDigits = "";
      publishPasswordSerial();
      pulseSignal(clearSignal);
    }

    if (action === "enter") {
      publishPasswordSerial();
      pulseSignal(enterSignal);
    }

    updateDisplay();
    setPressed(button, true);

    setTimeout(function () {
      setPressed(button, false);
    }, 120);
  }

  document.querySelectorAll(".keypad-button").forEach(function (button) {
    button.addEventListener("pointerdown", function (event) {
      var key = button.getAttribute("data-key");
      var action = button.getAttribute("data-action");

      event.preventDefault();

      if (key !== null) {
        pressDigit(button, key);
      } else if (action) {
        pressAction(button, action);
      }
    });
  });

  updateDisplay();
  publishPasswordSerial();

  if (lib) {
    if (correctPasswordSignal) {
      lib.subscribeState("b", correctPasswordSignal, function (value) {
        correctState = isHigh(value);
        updateResultState();
      });
    }

    if (wrongPasswordSignal) {
      lib.subscribeState("b", wrongPasswordSignal, function (value) {
        wrongState = isHigh(value);
        updateResultState();
      });
    }
  }
})();
</script>
